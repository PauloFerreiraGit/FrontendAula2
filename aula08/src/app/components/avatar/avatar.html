<div class="avatar-container">
  <img [src]="this?.localImage ??'/img/avatar.png'" alt="Imagem do avatar" class="avatar" />
  <!-- propertie bind, interpolação -->
  <span class="name">{{ this.localNome }}</span>
  <!-- evento de click -->
  <button (click)="logout()">SignOut</button>
  <!-- <button (mouseover)="logout()">Test</button> -->
</div>
